<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alumni · EMCL 고려대학교 에너지물질순환연구실</title>
  <meta name="description" content="에너지물질순환연구실(EMCL) 졸업생 — 학위, 졸업연도, 현 소속." />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .degree-filter { margin-bottom: 34px; }
    .degree-filter button { min-width: 180px; }
    .alumni-wrap { display: none; }
    .alumni-wrap.active { display: block; animation: fadeIn .25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    /* 졸업생 카드 리스트 (member 스타일과 동일 톤) */
    .member-list { display: flex; flex-direction: column; gap: 0; border-top: 2px solid var(--ink); }
    .member-list-item { display: grid; grid-template-columns: 110px 1fr; gap: 24px; align-items: center;
      padding: 20px 8px; border-bottom: 1px solid var(--line); transition: background .2s; }
    .member-list-item:hover { background: #faf8f3; }
    .member-list-item .mphoto { width: 100px; height: 125px; border-radius: var(--radius); overflow: hidden;
      background: linear-gradient(150deg,#efe9dd,#ded6c6); display: flex; align-items: center; justify-content: center; }
    .member-list-item .mphoto img { width: 100%; height: 100%; object-fit: cover; }
    .member-list-item .mphoto svg { width: 42%; fill: #c3b9a5; }
    .member-list-item .minfo { min-width: 0; }
    .member-list-item .mname { font-family: var(--font-display); font-weight: 700; font-size: 19px; color: var(--ink); margin-bottom: 4px; }
    .member-list-item .mname-en { font-family: var(--font-mono); font-size: 12px; font-weight: 400; color: var(--crimson); letter-spacing: .04em; margin-left: 8px; }
    .member-list-item dl { display: grid; grid-template-columns: 130px 1fr; gap: 4px 14px; font-size: 14px; margin-top: 8px; }
    .member-list-item dt { font-family: var(--font-mono); font-size: 10px; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-3); padding-top: 3px; }
    .member-list-item dd { color: var(--ink-2); }
    .member-list-item dd.aff { color: var(--accent); font-weight: 500; }
    .member-list-item dd.year { font-family: var(--font-mono); color: var(--crimson); font-weight: 700; }

    @media (max-width: 560px) {
      .member-list-item { grid-template-columns: 80px 1fr; gap: 16px; }
      .member-list-item .mphoto { width: 76px; height: 95px; }
      .member-list-item dl { grid-template-columns: 1fr; gap: 2px; }
      .member-list-item dt { padding-top: 8px; }
      .degree-filter button { min-width: auto; flex: 1; }
    }
  </style>
</head>
<body data-page="alumni" data-depth="1">
<div id="app">
  <div class="header-spacer"></div>
  <section class="page-hero"><div class="wrap">
    <nav class="breadcrumb">
      <a href="../index.html">Home</a><span class="sep">/</span>
      <a href="members.html">Members</a><span class="sep">/</span><span>Alumni</span>
    </nav>
    <span class="kicker">People</span>
    <h1 class="serif">Alumni</h1>
    <div class="sub">EMCL을 거쳐 간 연구자들</div>
    <div class="ghost-no">卒</div>
  </div></section>

  <section class="page-body"><div class="wrap">
    <p class="prose reveal" style="margin-bottom:34px;">EMCL을 거쳐 간 졸업생들은 학계와 산업계 곳곳에서 활약하고 있습니다.</p>

    <div class="pub-filter degree-filter reveal">
      <button class="active" data-tab="phd">Ph. D. Degree</button>
      <button data-tab="ms">M.S. Degree</button>
    </div>

    <div class="alumni-wrap active" id="tab-phd">
      <h2 class="lab-section-title reveal">Ph. D. Degree <span class="count-badge" id="cnt-phd"></span></h2>
      <div class="member-list" id="list-phd"></div>
    </div>

    <div class="alumni-wrap" id="tab-ms">
      <h2 class="lab-section-title reveal">M.S. Degree <span class="count-badge" id="cnt-ms"></span></h2>
      <div class="member-list" id="list-ms"></div>
    </div>
  </div></section>
</div>

<script src="../js/alumni-data.js"></script>
<script src="../js/main.js"></script>
<script>
(function () {
  var IMG_BASE = "../images/";
  var all = (window.EMCL_ALUMNI || []).slice();

  // 사진 없는 사람용 실루엣 SVG
  var PLACEHOLDER = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">' +
    '<path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>';

  function esc(s) { return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
  function isEng(s) { return /^[\x00-\x7F]+$/.test(s); }

  function cardHTML(p) {
    var photo = p.img
      ? '<img src="' + IMG_BASE + esc(p.img) + '" alt="' + esc(p.name) + '" loading="lazy">'
      : PLACEHOLDER;
    var dl = '';
    if (p.year)  dl += '<dt>Grad. Date</dt><dd class="year">' + esc(p.year) + '</dd>';
    if (p.aff)   dl += '<dt>Affiliation</dt><dd class="aff">' + esc(p.aff) + '</dd>';
    if (p.email) dl += '<dt>E-mail</dt><dd>' + esc(p.email) + '</dd>';
    // 영문 이름이 따로 있으면(이미 영문 이름인 경우) 중복 표기 안 함
    var nameEn = (!isEng(p.name)) ? '' : '';
    return '<div class="member-list-item reveal">' +
      '<div class="mphoto">' + photo + '</div>' +
      '<div class="minfo"><div class="mname">' + esc(p.name) + nameEn + '</div>' +
      '<dl>' + dl + '</dl></div></div>';
  }

  function renderList(degree, elId, cntId) {
    var list = all.filter(function (p) { return p.degree === degree; });
    list.sort(function (a, b) { return (b.year || "0").localeCompare(a.year || "0"); });
    document.getElementById(elId).innerHTML = list.map(cardHTML).join("");
    document.getElementById(cntId).textContent = list.length;
  }

  renderList("phd", "list-phd", "cnt-phd");
  renderList("ms", "list-ms", "cnt-ms");

  // 탭 전환
  var buttons = document.querySelectorAll(".degree-filter button");
  var tabs = document.querySelectorAll(".alumni-wrap");
  buttons.forEach(function (btn) {
    btn.addEventListener("click", function () {
      buttons.forEach(function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
      tabs.forEach(function (t) { t.classList.remove("active"); });
      document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
    });
  });
})();
</script>
</body>
</html>
