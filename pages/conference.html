<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Conference · EMCL 고려대학교 에너지물질순환연구실</title>

  <meta
    name="description"
    content="에너지물질순환연구실(EMCL)의 학술대회 논문 발표 목록."
  />

  <link rel="stylesheet" href="../css/style.css" />


</head>

<body data-page="conference" data-depth="1">

<div id="app">

  <div class="header-spacer"></div>

  <!-- PAGE HERO -->
  <section class="page-hero">
    <div class="wrap">

      <nav class="breadcrumb">
        <a href="../index.html">Home</a>
        <span class="sep">/</span>
        <span>Publications</span>
      </nav>

      <span class="kicker">Research Output</span>

      <h1 class="serif">Conference</h1>

      <div class="sub">
        Conference Proceedings &amp; Presentations
      </div>

      <div class="ghost-no">演</div>

    </div>
  </section>

  <!-- PAGE BODY -->
  <section class="page-body">
    <div class="wrap">

      <!-- FILTER -->
      <div class="pub-filter conference-filter">
        <button class="active" data-type="intl">
          International
        </button>

        <button data-type="dom">
          Domestic
        </button>
      </div>

      <!-- LIST -->
      <div id="conference-list"></div>

      <!-- PAGER -->
      <div class="pub-pager" id="conference-pager"></div>

    </div>
  </section>

</div>

<!-- DATA -->
<script src="../js/conference.js"></script>
<script src="../js/conference_dom.js"></script>

<!-- COMMON -->
<script src="../js/main.js"></script>

<!-- PAGE SCRIPT -->
<script>
(function () {

  var PER_PAGE = 15;

  var page = 1;

  var currentType = "intl";

  /* =====================================================
     GET DATA
     ===================================================== */

  function getData() {

    return currentType === "intl"
      ? (window.EMCL_CONFERENCES || []).slice()
      : (window.EMCL_CONFERENCES_DOM || []).slice();
  }

  /* =====================================================
     BOLD LAB MEMBERS
     ===================================================== */

  function boldNames(authors) {
    return authors.replace(
      /(Yong Tae Kang|Y\.T\. Kang|YT Kang|강용태)/g,
      "<b>$1</b>"
    );
  }

  /* =====================================================
     RENDER
     ===================================================== */

  function render() {

    var conferences = getData();

    conferences.sort(function (a, b) {
      return b.year - a.year;
    });

    var total = conferences.length;

    var yearCount = {};

    conferences.forEach(function (p) {

      yearCount[p.year] =
        (yearCount[p.year] || 0) + 1;
    });

    var seen = {};

    conferences.forEach(function (p) {

      seen[p.year] =
        (seen[p.year] || 0) + 1;

      p._no =
        yearCount[p.year] - seen[p.year] + 1;
    });

    var pages =
      Math.max(1, Math.ceil(total / PER_PAGE));

    if (page > pages) page = pages;

    var start = (page - 1) * PER_PAGE;

    var slice =
      conferences.slice(start, start + PER_PAGE);

    var html = "";

    var curYear = null;

    slice.forEach(function (p) {

      if (p.year !== curYear) {

        curYear = p.year;

        html +=
          '<div class="pub-year">' +
          curYear +
          '</div>';
      }

      html +=
        '<div class="paper">' +

          '<div class="pno">' +
            p._no +
          '</div>' +

          '<div class="pbody">' +

            boldNames(p.authors) +

            ' <span class="pttl">"' +
            p.title +
            '"</span>, ' +

            '<span class="pjn">' +
            p.conference +
            '</span>, ' +

            '<span class="ploc">' +
            p.location +
            '</span>, ' +

            p.year +

          '</div>' +

        '</div>';
    });

    document.getElementById("conference-list").innerHTML =
      html;

    renderPager(pages);
  }

  /* =====================================================
     PAGER
     ===================================================== */

  function renderPager(pages) {

    if (pages <= 1) {

      document.getElementById(
        "conference-pager"
      ).innerHTML = "";

      return;
    }

    var h =
      '<button ' +
      (page === 1 ? 'disabled' : '') +
      ' data-go="prev">‹</button>';

    for (var i = 1; i <= pages; i++) {

      h +=
        '<button class="' +
        (i === page ? 'active' : '') +
        '" data-go="' + i + '">' +
        i +
        '</button>';
    }

    h +=
      '<button ' +
      (page === pages ? 'disabled' : '') +
      ' data-go="next">›</button>';

    var el =
      document.getElementById("conference-pager");

    el.innerHTML = h;

    el.querySelectorAll("button")
      .forEach(function (b) {

        b.addEventListener("click", function () {

          var g =
            b.getAttribute("data-go");

          if (g === "prev") {

            page =
              Math.max(1, page - 1);

          } else if (g === "next") {

            page =
              Math.min(pages, page + 1);

          } else {

            page = parseInt(g, 10);
          }

          render();
        });
      });
  }

  /* =====================================================
     FILTER BUTTON
     ===================================================== */

  document
    .querySelectorAll(".conference-filter button")
    .forEach(function(btn){

      btn.addEventListener("click", function(){

        document
          .querySelectorAll(".conference-filter button")
          .forEach(function(b){

            b.classList.remove("active");
          });

        btn.classList.add("active");

        currentType = btn.dataset.type;

        page = 1;

        render();
      });
    });

  /* =====================================================
     INIT
     ===================================================== */

  render();

})();
</script>

</body>
</html>
