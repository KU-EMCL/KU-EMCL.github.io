  <section class="page-body"><div class="wrap">

    <div class="contact-grid">

        <dl>
          <dt>Address</dt><dd>서울특별시 성북구 안암로 145<br>고려대학교 창의관 616</dd>

           Google: 지도 → 공유 → 지도 퍼가기 → HTML 복사
           Kakao:  카카오맵 → 공유 → 지도 퍼가기 -->
      <iframe
        src="https://www.google.com/maps?q=고려대학교 창의관&output=embed"
        title="고려대학교 공과대학 지도"
