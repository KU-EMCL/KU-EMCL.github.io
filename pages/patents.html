<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patent · EMCL 고려대학교 에너지물질순환연구실</title>
  <meta name="description" content="에너지물질순환연구실(EMCL)의 국내 및 국제(PCT) 특허 목록." />
  <link rel="stylesheet" href="../css/style.css" />

</head>
<body data-page="patents" data-depth="1">
<div id="app">
  <div class="header-spacer"></div>

  <section class="page-hero"><div class="wrap">
    <nav class="breadcrumb"><a href="../index.html">Home</a><span class="sep">/</span><a href="publications.html">Publications</a><span class="sep">/</span><span>Patents</span></nav>
    <span class="kicker">Intellectual Property</span>
    <h1 class="serif">Patent</h1>
    <div class="sub">국내 등록·출원 및 국제(PCT) 특허</div>
    <div class="ghost-no">特</div>
  </div></section>

  <section class="page-body"><div class="wrap">
    
    <div class="table-responsive">
      <table class="lab-table">
        <thead>
          <tr>
            <th class="center" style="width: 60px;">No.</th>
            <th>발명의 명칭 (Title)</th>
            <th class="center">출원·등록번호</th>
            <th class="center">일자</th>
            <th class="center">상태</th>
          </tr>
        </thead>
        <tbody id="patent-list">
          </tbody>
      </table>
    </div>
    
    <div class="pub-pager" id="patent-pager"></div>

  </div></section>

</div>

<script src="../js/patent.js"></script>
<script src="../js/main.js"></script>
<script>
(function () {
  var PER_PAGE = 15; // 한 페이지에 보여줄 개수
  
  // window 객체에 선언된 배열을 가져옵니다. (없으면 빈 배열)
  var patents = (window.EMCL_PATENTS || []).slice();

  // 날짜(문자열)를 기준으로 내림차순 정렬
  patents.sort(function (a, b) { 
    if (a.date < b.date) return 1;
    if (a.date > b.date) return -1;
    return 0;
  });

  var total = patents.length;
  
  // 전체 순번 매기기 (최신 항목이 번호가 가장 큼)
  patents.forEach(function (p, index) {
    p._no = total - index;
  });

  var page = 1;
  var pages = Math.max(1, Math.ceil(total / PER_PAGE));

  // 상태에 따른 뱃지 클래스 부여
  function getStatusBadge(status) {
    if (status === '등록' || status === 'Registered') {
      return '<span class="badge-pill reg">' + status + '</span>';
    } else if (status === '출원' || status === 'Pending' || status === 'Applied') {
      return '<span class="badge-pill app">' + status + '</span>';
    }
    return '<span class="badge-pill done">' + status + '</span>'; // 기본 회색 뱃지
  }

  function render() {
    var start = (page - 1) * PER_PAGE;
    var slice = patents.slice(start, start + PER_PAGE);
    var html = "";
    
    if (slice.length === 0) {
      html = '<tr><td colspan="5" class="center" style="padding: 40px 0;">특허 정보가 준비 중입니다.</td></tr>';
    } else {
      slice.forEach(function (p) {
        html += '<tr>' +
          '<td class="center">' + p._no + '</td>' +
          '<td style="font-weight: 500; color: var(--ink);">' + p.title + '</td>' +
          '<td class="center" style="font-family: var(--font-mono); font-size: 13.5px;">' + (p.number || "-") + '</td>' +
          '<td class="center" style="font-family: var(--font-mono); font-size: 13.5px;">' + p.date + '</td>' +
          '<td class="center">' + getStatusBadge(p.status) + '</td>' +
        '</tr>';
      });
    }
    
    document.getElementById("patent-list").innerHTML = html;
    renderPager();
    
    // 페이지 이동 시 상단 테이블 시작 위치로 스크롤
    if(page > 1) {
        document.querySelector('.table-responsive').scrollIntoView({ behavior: "smooth", block: "start" });
    }
  }

  function renderPager() {
    if (pages <= 1) { document.getElementById("patent-pager").innerHTML = ""; return; }
    var h = '<button ' + (page === 1 ? 'disabled' : '') + ' data-go="prev">‹</button>';
    for (var i = 1; i <= pages; i++) {
      h += '<button class="' + (i === page ? 'active' : '') + '" data-go="' + i + '">' + i + '</button>';
    }
    h += '<button ' + (page === pages ? 'disabled' : '') + ' data-go="next">›</button>';
    
    var el = document.getElementById("patent-pager");
    el.innerHTML = h;
    el.querySelectorAll("button").forEach(function (b) {
      b.addEventListener("click", function () {
        var g = b.getAttribute("data-go");
        if (g === "prev") page = Math.max(1, page - 1);
        else if (g === "next") page = Math.min(pages, page + 1);
        else page = parseInt(g, 10);
        render();
      });
    });
  }

  render();
})();
</script>
</body>
</html>
